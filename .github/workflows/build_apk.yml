name: Build Release APK (Chinese Version)

on:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Generate i18n files
        run: flutter pub run slang

      - name: Generate signing key
        run: |
          mkdir -p android/keys
          keytool -genkey -v -keystore android/keys/release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias release -storepass password -keypass password -dname "CN=Test, OU=Test, O=Test, L=Test, ST=Test, C=CN"
          echo "storeFile=keys/release-key.jks" > android/keys/key.properties
          echo "storePassword=password" >> android/keys/key.properties
          echo "keyPassword=password" >> android/keys/key.properties
          echo "keyAlias=release" >> android/keys/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: monekin-zh-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Rename APK
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/Monekin-zh.apk

      - name: Upload renamed APK
        uses: actions/upload-artifact@v4
        with:
          name: Monekin-zh.apk
          path: release/Monekin-zh.apk
